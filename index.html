<!DOCTYPE html>

<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="header">
    <h1>🌤 Weather App</h1>
    <button id="themeBtn">🌙 Dark Mode</button>
</div>

<div class="search-box">
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>
</div>

<button id="locationBtn" onclick="getLocationWeather()">
    📍 My Location
</button>

<div id="weather">
    <h2>City Name</h2>
    <p>🌡 Temperature: -- °C</p>
    <p>💧 Humidity: -- %</p>
    <p>🌬 Wind Speed: -- m/s</p>
    <p>☁ Weather: --</p>
</div>

<div id="forecast"></div>


</div>

<script src="script.js"></script>

</body>
</html>
